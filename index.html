<!DOCTYPE html>

<head>

<meta name="mobile-web-app-capable" content="yes">

<title>Scrabble Scorekeeper</title>
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;touch-action:pan-x pan-y;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{background:linear-gradient(165deg,#15110c 0%,#1e1812 48%,#14100b 100%);min-height:100vh;min-height:100dvh;color:#f3e9d6;
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;}
h1{margin:0;} p{margin:0;}
.wrap{max-width:760px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(56px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));}
.storebar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:18px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid #2c241b;border-radius:12px;}

.sc-tile{position:relative;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(158deg,#f4e8ca,#e3d0a4);color:#3a2c18;font-weight:800;border-radius:7px;
  font-family:Georgia,"Times New Roman",serif;line-height:1;box-shadow:inset 0 1px 0 rgba(255,255,255,.65),inset 0 -2px 3px rgba(120,90,40,.28),0 2px 4px rgba(0,0,0,.4);}
.sc-tile-val{position:absolute;right:3px;bottom:1px;font-weight:700;opacity:.8;}

.sc-btn{border:0;cursor:pointer;font-weight:700;border-radius:12px;padding:11px 15px;font-size:15px;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1;
  transition:transform .12s ease,background .15s ease,box-shadow .15s ease,opacity .15s ease;color:inherit;font-family:inherit;}
.sc-btn:active{transform:translateY(1px) scale(.99);}
.sc-btn:disabled{opacity:.42;cursor:not-allowed;}
.sc-sm{padding:7px 11px;font-size:13px;border-radius:10px;}
.sc-gold{background:linear-gradient(180deg,#f4c95c,#e0ad3f);color:#2a1f0c;box-shadow:0 6px 16px rgba(224,173,63,.26);}
.sc-gold:hover:not(:disabled){box-shadow:0 9px 22px rgba(224,173,63,.4);}
.sc-soft{background:#322a21;color:#f3e9d6;}
.sc-soft:hover:not(:disabled){background:#3c3328;}
.sc-ghost{background:transparent;color:#cbbba2;}
.sc-ghost:hover:not(:disabled){background:rgba(255,255,255,.06);}
.sc-danger{background:#5a2a24;color:#f5ddd6;}
.sc-danger:hover:not(:disabled){background:#6d332b;}

.sc-icon{border:0;background:rgba(255,255,255,.05);color:#cbbba2;cursor:pointer;width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,color .15s,opacity .15s;flex:none;}
.sc-icon:hover:not(:disabled){background:rgba(255,255,255,.1);}
.sc-icon:disabled{opacity:.35;cursor:not-allowed;}
.sc-icon-danger:hover:not(:disabled){background:#5a2a24;color:#f5ddd6;}
.sc-icon-on{background:linear-gradient(180deg,#f4c95c,#e0ad3f);color:#2a1f0c;}
.sc-icon-on:hover:not(:disabled){background:linear-gradient(180deg,#f6d066,#e6b44a);color:#2a1f0c;}
.sc-mini{border:0;background:rgba(255,255,255,.05);color:#b7a892;cursor:pointer;width:30px;height:20px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.sc-mini:first-child{border-radius:8px 8px 0 0;}
.sc-mini:last-child{border-radius:0 0 8px 8px;margin-top:2px;}
.sc-mini:hover:not(:disabled){background:rgba(255,255,255,.12);}
.sc-mini:disabled{opacity:.3;cursor:not-allowed;}

.sc-titlebtn{border:0;background:transparent;color:#f3e9d6;cursor:pointer;display:flex;align-items:center;gap:7px;flex:1;min-width:0;padding:6px 4px;border-radius:8px;transition:background .15s;text-align:left;font-family:inherit;}
.sc-titlebtn:hover{background:rgba(255,255,255,.05);}

.sc-inp{background:#1b1610;border:1px solid #3a2f24;color:#f3e9d6;border-radius:12px;padding:11px 13px;font-size:16px;outline:none;width:100%;font-family:inherit;transition:border .15s,box-shadow .15s;}
.sc-inp::placeholder{color:#6f6354;}
.sc-inp:focus{border-color:#e0ad3f;box-shadow:0 0 0 3px rgba(224,173,63,.18);}
.sc-area{width:100%;min-height:150px;resize:vertical;background:#15110c;border:1px solid #3a2f24;color:#d8cbb4;border-radius:12px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.5;outline:none;}
.sc-area:focus{border-color:#e0ad3f;box-shadow:0 0 0 3px rgba(224,173,63,.18);}

.sc-card{background:linear-gradient(180deg,#241d16,#201a13);border:1px solid #34291f;border-radius:16px;}
.sc-panel{background:#1f1810;border:1px solid #33281d;border-radius:16px;}

.sc-chip{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;letter-spacing:.4px;white-space:nowrap;}
.sc-chip-live{background:rgba(123,196,127,.16);color:#8fd28f;}
.sc-chip-done{background:rgba(240,192,82,.16);color:#f0c052;}
.sc-dot{width:7px;height:7px;border-radius:999px;display:inline-block;}

.sc-felt{background:linear-gradient(180deg,#21503d,#1b4231);border:1px solid #143226;border-radius:14px;box-shadow:inset 0 2px 12px rgba(0,0,0,.35);}
.sc-scell{border:0;cursor:pointer;height:40px;border-radius:7px;font-weight:800;font-size:16px;font-family:Georgia,serif;color:#3a2c18;background:linear-gradient(158deg,#f4e8ca,#e3d0a4);box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 2px 3px rgba(0,0,0,.3);transition:transform .1s ease,box-shadow .15s,background .3s ease;width:100%;}
.sc-scell:hover{transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 4px 8px rgba(0,0,0,.4);}
.sc-scell.sc-cell-flash{background:linear-gradient(158deg,#a8e6aa,#7bc47f) !important;color:#15110c;transform:scale(1.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 4px 12px rgba(91,196,127,.55);}
.sc-slot-current{border:2px dashed #f0c052;border-radius:7px;background:rgba(240,192,82,.08);animation:sc-pulse 1.7s ease-in-out infinite;cursor:pointer;}
.sc-slot-empty{border:1px dashed #2f5847;border-radius:7px;background:rgba(255,255,255,.02);}
.sc-total{height:40px;display:flex;align-items:center;justify-content:center;border-radius:7px;font-weight:800;font-size:16px;color:#2a1f0c;background:linear-gradient(180deg,#f4c95c,#e0ad3f);box-shadow:0 2px 6px rgba(224,173,63,.3);}
.sc-total-hidden{background:linear-gradient(180deg,#7c6a45,#6a5a39);color:#c9b78c;box-shadow:none;}

.sc-stand{transition:border-color .3s ease;overflow:hidden;}
.sc-leader{border-color:#caa23e !important;background:linear-gradient(180deg,#2e2616,#241d12);animation:sc-glow 2.6s ease-in-out infinite;}
.sc-shine{position:absolute;top:0;left:0;height:100%;width:45%;pointer-events:none;border-radius:16px;background:linear-gradient(100deg,transparent,rgba(255,228,160,.16),transparent);transform:translateX(-160%);animation:sc-shimmer 3.4s ease-in-out infinite;}
.sc-crown{animation:sc-crownbob 2.2s ease-in-out infinite;transform-origin:center;}
.sc-winner{border-color:#caa23e !important;}
.sc-popnum{animation:sc-pop .35s ease both;}
.fadein{animation:sc-rise .4s ease both;}

.sc-overlay{position:fixed;inset:0;background:rgba(8,6,3,.66);display:grid;place-items:center;z-index:60;padding:16px;animation:sc-fade .18s ease both;}
.sc-toast{display:inline-flex;align-items:center;background:#2a2114;border:1px solid #caa23e;color:#f6e7c4;padding:10px 18px;border-radius:999px;font-weight:800;font-size:14px;box-shadow:0 12px 32px rgba(0,0,0,.45);animation:sc-toastpop 2.6s ease forwards;white-space:nowrap;}
#toastLayer{display:flex;justify-content:center;pointer-events:none;}

.sc-confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.sc-cpiece{position:absolute;top:-14px;border-radius:2px;animation-name:sc-confetti;animation-timing-function:linear;animation-fill-mode:forwards;}

@keyframes sc-rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes sc-fade{from{opacity:0;}to{opacity:1;}}
@keyframes sc-pop{0%{transform:scale(.55);opacity:0;}60%{transform:scale(1.18);}100%{transform:scale(1);opacity:1;}}
@keyframes sc-pulse{0%,100%{opacity:.55;}50%{opacity:1;}}
@keyframes sc-glow{0%,100%{box-shadow:0 0 0 1px rgba(240,192,82,.45),0 0 16px rgba(240,192,82,.18);}50%{box-shadow:0 0 0 1px rgba(240,192,82,.8),0 0 30px rgba(240,192,82,.42);}}
@keyframes sc-shimmer{0%{transform:translateX(-160%);}60%,100%{transform:translateX(260%);}}
@keyframes sc-crownbob{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-3px) rotate(5deg);}}
@keyframes sc-confetti{0%{transform:translateY(-14px) rotate(0);opacity:1;}100%{transform:translateY(220px) rotate(680deg);opacity:0;}}
@keyframes sc-toastpop{0%{opacity:0;transform:translateY(6px);}12%{opacity:1;transform:translateY(0);}86%{opacity:1;}100%{opacity:0;transform:translateY(6px);}}

@media (prefers-reduced-motion: reduce){
  .sc-leader,.sc-shine,.sc-crown,.sc-cpiece,.sc-slot-current,.sc-popnum,.fadein{animation:none !important;}
  .sc-leader{box-shadow:0 0 0 1px rgba(240,192,82,.7);}
}

/* ── In-screen numpad ── */
.sc-np-display{background:#15110c;border:1.5px solid #3a2f24;border-radius:12px;padding:9px 14px;font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right;min-height:48px;user-select:none;transition:border-color .15s,color .15s;color:#6f6354;}
.sc-np-display.sc-np-filled{border-color:#e0ad3f;color:#f4d27a;}
.sc-np{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:8px;}
.sc-np-btn{border:0;cursor:pointer;font-weight:800;font-size:16px;font-family:Georgia,"Times New Roman",serif;color:#3a2c18;background:linear-gradient(158deg,#f4e8ca,#e3d0a4);box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 2px 3px rgba(0,0,0,.3);border-radius:8px;height:40px;line-height:1;transition:transform .08s ease,box-shadow .12s ease;user-select:none;-webkit-tap-highlight-color:transparent;}
.sc-np-btn:hover{transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 4px 8px rgba(0,0,0,.38);}
.sc-np-btn:active{transform:translateY(1px) scale(.96);box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 1px 2px rgba(0,0,0,.3);}
</style>
</head>
<body>
<div id="app" class="sc-root"></div>
<script>
(function(){
  "use strict";
  var KEY="scrabble:data:v1";
  var LETTER_VALUES={A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10};
  var VERSION='1.3.4';
  var COLORS=["#5BA8C9","#E08A4B","#C76B98","#7BC47F","#B79CED","#A7C957","#5BC0BE","#E8775A"];
  var lblCss="display:block;font-size:13px;font-weight:700;color:#b7a892;margin:0 2px 8px";

  var ICONS={
    crown:'<path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.519l4.276 3.664a1 1 0 0 0 1.516-.294z"/><path d="M5 21h14"/>',
    trophy:'<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>',
    plus:'<path d="M5 12h14"/><path d="M12 5v14"/>',
    trash:'<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
    arrowLeft:'<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
    chevUp:'<path d="m18 15-6-6-6 6"/>',
    chevDown:'<path d="m6 9 6 6 6-6"/>',
    undo:'<path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>',
    rotate:'<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>',
    flag:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/>',
    play:'<polygon points="6 3 20 12 6 21 6 3"/>',
    check:'<path d="M20 6 9 17l-5-5"/>',
    x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
    hash:'<line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21"/>',
    pencil:'<path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/>',
    download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
    upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>',
    copy:'<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2"/>',
    eye:'<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>',
    eyeOff:'<path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/>'
  };
  function ic(name,size,opts){
    size=size||18; opts=opts||{};
    var fill=opts.fill||"none",stroke=opts.stroke||"currentColor",sw=opts.sw||2,cls=opts.cls?(' class="'+opts.cls+'"'):'';
    return '<svg'+cls+' xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round" style="flex:none;vertical-align:middle">'+(ICONS[name]||'')+'</svg>';
  }

  function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function fmtDate(ts){try{var d=new Date(ts);return d.toLocaleDateString(undefined,{day:'numeric',month:'short'})+', '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}

  /* ---- derivations ---- */
  function totalsOf(g){var n=g.players.length,t=new Array(n).fill(0);g.scores.forEach(function(v,i){t[i%n]+=v;});return t;}
  function nextTurn(g){var n=g.players.length,idx=g.scores.length;return {idx:idx,player:idx%n,round:Math.floor(idx/n)};}
  function standings(g){
    var totals=totalsOf(g);
    var arr=g.players.map(function(p,i){return {p:p,i:i,total:totals[i]};});
    arr.sort(function(a,b){return b.total-a.total||a.i-b.i;});
    var rank=0,prev=null;
    arr.forEach(function(row,k){if(prev===null||row.total!==prev){rank=k+1;prev=row.total;}row.rank=rank;});
    return arr;
  }
  function leaderInfo(g){
    var totals=totalsOf(g),max=Math.max.apply(null,totals);
    var leaders=totals.map(function(t,i){return t===max?i:-1;}).filter(function(i){return i>=0;});
    var played=g.scores.length>0&&max>0;
    return {max:max,leaders:leaders,unique:leaders.length===1,index:leaders.length===1?leaders[0]:-1,played:played};
  }
  function buildExport(games){return JSON.stringify({app:"scrabble-scorekeeper",v:1,exportedAt:Date.now(),games:games},null,2);}
  function mergeGames(current,incoming){
    var map={},order=[];
    current.forEach(function(g){map[g.id]=g;});
    incoming.forEach(function(g){var ex=map[g.id];if(!ex||(g.updatedAt||0)>=(ex.updatedAt||0))map[g.id]=g;});
    var out=[];for(var k in map){if(map.hasOwnProperty(k))out.push(map[k]);}
    out.sort(function(a,b){return (b.updatedAt||0)-(a.updatedAt||0);});
    return out;
  }

  /* ---- tiles ---- */
  function tile(ch,size){
    var c=String(ch==null?'':ch).toUpperCase().slice(0,1)||'?';
    var v=LETTER_VALUES[c];
    return '<div class="sc-tile" style="width:'+size+'px;height:'+size+'px;font-size:'+Math.round(size*0.5)+'px"><span>'+esc(c)+'</span>'+(v!=null?'<sub class="sc-tile-val" style="font-size:'+Math.round(size*0.27)+'px">'+v+'</sub>':'')+'</div>';
  }
  function avatar(name,color,size){
    var ch=((name||'').trim()[0])||'?';
    return '<div style="padding:2px;border-radius:'+Math.round(size*0.26)+'px;background:'+color+';display:inline-flex;flex:none">'+tile(ch,size)+'</div>';
  }

  /* ---- state ---- */
  var state={games:[],view:{name:'home',id:null},setup:{name:'',players:[]},renaming:false,modal:null,backup:null,importErr:'',editScore:null,exportText:''};
  var numInput='';      // current numpad entry (main game)
  var editNumInput='';  // current numpad entry (edit modal)
  var prevPage='';      // tracks last rendered page to control fadein
  var toastTimer=null;
  var app=document.getElementById('app');
  function currentGame(){for(var i=0;i<state.games.length;i++){if(state.games[i].id===state.view.id)return state.games[i];}return null;}
  function load(){try{var r=localStorage.getItem(KEY);if(r){var p=JSON.parse(r);if(p&&Array.isArray(p.games))state.games=p.games;}}catch(e){}}
  function save(){try{localStorage.setItem(KEY,JSON.stringify({v:1,games:state.games}));}catch(e){}}

  /* ---- main numpad ---- */
  function updateDisplay(){
    var el=document.querySelector('.sc-np-display');
    if(!el)return;
    el.textContent=numInput||'0';
    el.classList.toggle('sc-np-filled',!!numInput);
  }
  function npDigit(d){
    if(navigator.vibrate)navigator.vibrate(8);
    var digits=numInput.replace('-','');
    if(digits.length>=4)return;
    if(!numInput&&d==='0')return;
    numInput+=d;
    updateDisplay();
  }
  function npDel(){
    numInput=numInput.slice(0,-1);
    if(numInput==='-')numInput='';
    updateDisplay();
  }
  function npSign(){
    var digits=numInput.replace('-','');
    if(!digits)return;
    numInput=numInput[0]==='-'?digits:'-'+digits;
    updateDisplay();
  }

  /* ---- views ---- */
  function gameCard(g){
    var lead=leaderInfo(g);
    var rounds=Math.ceil(g.scores.length/g.players.length);
    var avs=g.players.slice(0,6).map(function(p,i){return '<span style="margin-left:'+(i===0?0:-8)+'px">'+avatar(p.name,COLORS[i%COLORS.length],26)+'</span>';}).join('');
    var hide=g.hidden&&!g.finished;
    var leadHtml=hide
      ? '<div style="display:flex;align-items:center;gap:6px;color:#8a7c69;font-weight:700;font-size:13px">'+ic('eyeOff',15,{stroke:'#8a7c69'})+'Scores hidden</div>'
      : lead.played
      ? '<div style="display:flex;align-items:center;gap:6px;color:#f0c052;font-weight:700;font-size:14px">'+ic('crown',15,{fill:'#f0c052',stroke:'#f0c052',sw:1.5})+(lead.unique?esc(g.players[lead.index].name)+' · '+lead.max:'Tied · '+lead.max)+'</div>'
      : '<span style="color:#6f6354;font-size:13px">No scores yet</span>';
    return '<div class="sc-card" style="padding:16px;cursor:pointer" data-action="open-game" data-id="'+g.id+'">'
      +'<div style="display:flex;justify-content:space-between;gap:12px">'
        +'<div style="min-width:0">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
            +'<span style="font-weight:800;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(g.name)+'</span>'
            +'<span class="sc-chip '+(g.finished?'sc-chip-done':'sc-chip-live')+'">'+(g.finished?'Final':'In play')+'</span>'
          +'</div>'
          +'<div style="color:#8a7c69;font-size:13px">'+g.players.length+' players · '+(rounds===0?'not started':rounds+' round'+(rounds>1?'s':''))+' · '+esc(fmtDate(g.updatedAt))+'</div>'
        +'</div>'
        +'<button class="sc-icon sc-icon-danger" data-action="delete-game" data-id="'+g.id+'" data-name="'+esc(g.name)+'" title="Delete game">'+ic('trash',17)+'</button>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap"><div style="display:flex">'+avs+'</div>'+leadHtml+'</div>'

        +'<div style="display:flex;gap:6px">'

    }
    return s;

  function viewGame(fade){
    var g=currentGame();
    if(!g){state.view={name:'home',id:null};return viewHome();}
    var n=g.players.length,totals=totalsOf(g),rows=standings(g),lead=leaderInfo(g),turn=nextTurn(g);
    var hide=g.hidden&&!g.finished;
    var colors=g.players.map(function(_,i){return COLORS[i%COLORS.length];});
    var playedRounds=Math.ceil(g.scores.length/n);
    var displayRounds=g.finished?playedRounds:Math.ceil((g.scores.length+1)/n);
    var winnerLine=lead.unique?(esc(g.players[lead.index].name)+' wins with '+lead.max):('Tie at '+lead.max+' — '+lead.leaders.map(function(i){return esc(g.players[i].name);}).join(' &amp; '));

    var header='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">'
      +'<button class="sc-btn sc-ghost" style="margin-left:-8px;padding:8px 10px" data-action="go-home">'+ic('arrowLeft',18)+'</button>';
    if(state.renaming){
      header+='<div style="display:flex;align-items:center;gap:6px;flex:1">'
        +'<input class="sc-inp" id="renameInput" value="'+esc(g.name)+'" maxlength="40">'
        +'<button class="sc-icon" data-action="rename-commit">'+ic('check',17)+'</button>'
        +'<button class="sc-icon" data-action="rename-cancel">'+ic('x',17)+'</button></div>';
    } else {
      header+='<button class="sc-titlebtn" data-action="rename-start" title="Rename game">'
        +'<span style="font-weight:800;font-size:19px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(g.name)+'</span>'
        +ic('pencil',14,{stroke:'#6f6354'})+'</button>';
    }
    if(!g.finished){
      header+='<button class="sc-icon'+(g.hidden?' sc-icon-on':'')+'" data-action="toggle-hidden" title="'+(g.hidden?'Show scores':'Hide scores')+'" aria-pressed="'+(g.hidden?'true':'false')+'">'+ic(g.hidden?'eyeOff':'eye',18)+'</button>';
    }
    header+='<span class="sc-chip '+(g.finished?'sc-chip-done':'sc-chip-live')+'" style="flex:none">'+(g.finished?'Final':'Round '+(turn.round+1))+'</span></div>';

    var winner='';
    if(g.finished&&lead.played){
      winner='<div class="sc-card sc-winner" style="position:relative;overflow:hidden;padding:18px;margin-bottom:16px">'
        +'<div class="sc-confetti">'+confettiHTML()+'</div>'
        +'<div style="display:flex;align-items:center;gap:12px;position:relative">'+ic('trophy',30,{stroke:'#f0c052'})
          +'<div><div style="font-size:12.5px;letter-spacing:1.5px;color:#caa23e;font-weight:700;text-transform:uppercase">Game over</div>'
          +'<div style="font-size:20px;font-weight:800">'+winnerLine+'</div></div></div></div>';
    }

    var stand='<div style="display:grid;gap:10px;margin-bottom:16px">';
    g.players.forEach(function(p,i){
      var isLeader=lead.played&&totals[i]===lead.max;
      var isTurn=!g.finished&&i===turn.player;
      var cardExtra=isTurn
        ?';border:2px solid '+colors[i]+';background:linear-gradient(180deg,'+colors[i]+'22,'+colors[i]+'0a)'
        :'';
      stand+='<div class="sc-card sc-stand" style="padding:12px 14px;display:flex;align-items:center;gap:12px;position:relative'+cardExtra+'">'
        +avatar(p.name,colors[i],36)
        +'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div>'
          +(isTurn?'<div style="display:inline-flex;align-items:center;gap:5px;margin-top:4px;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:800;background:'+colors[i]+'33;color:'+colors[i]+';border:1px solid '+colors[i]+'66">'+ic('play',11,{fill:colors[i],stroke:'none'})+' Your turn</div>':'')
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:5px;flex:none">'
          +(isLeader&&!hide?ic('crown',18,{fill:'#f0c052',stroke:'#f0c052',sw:1.5,cls:'sc-crown'}):'')
          +'<div class="sc-popnum" style="font-weight:800;font-size:26px;font-variant-numeric:tabular-nums;color:'+(hide?'#6f6354':(isLeader?'#f4d27a':'#f3e9d6'))+'">'+(hide?'•••':totals[i])+'</div>'
        +'</div>'
      +'</div>';
    });
    stand+='</div>';

    var entry='';
    if(!g.finished){
      entry='<div style="position:fixed;bottom:0;left:0;right:0;z-index:10;background:#1a140e;border-top:1px solid #33281d;box-shadow:0 -6px 24px rgba(0,0,0,.6);padding:12px calc(16px + env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left))">'
        +'<div id="toastLayer" style="position:absolute;bottom:100%;left:0;right:0;padding-bottom:8px"></div>'
        +'<div style="max-width:728px;margin:0 auto">'
        +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+avatar(g.players[turn.player].name,colors[turn.player],34)
          +'<div><div style="font-size:12.5px;color:#8a7c69;font-weight:600">Round '+(turn.round+1)+' · turn to score</div>'
          +'<div style="font-size:17px;font-weight:800">'+esc(g.players[turn.player].name)+'</div></div></div>'
        +numpadHTML()
        +'<div style="display:flex;gap:6px;margin-top:8px">'
          +'<button class="sc-btn sc-soft sc-sm" style="width:40px;padding:0;flex:none;justify-content:center;font-size:17px" data-action="np-del" title="Backspace">⌫</button>'
          +'<button class="sc-btn sc-soft sc-sm" style="width:40px;padding:0;flex:none;justify-content:center;font-size:16px;font-weight:800" data-action="np-sign" title="Toggle negative">±</button>'
          +'<button class="sc-btn sc-soft" style="flex:1;justify-content:center;font-size:14px" data-action="score-pass">Pass / 0</button>'
          +'<button class="sc-btn sc-soft sc-sm" style="flex:none;justify-content:center" data-action="score-undo"'+(g.scores.length?'':' disabled')+' title="Undo last">'+ic('undo',16)+'</button>'
          +'<button class="sc-btn sc-gold" style="flex:none;padding:0 16px" data-action="score-add">'+ic('plus',17)+' Add</button>'
        +'</div>'
        +'</div></div>';
    } else {
      entry='<div class="sc-panel" style="padding:14px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap">'
        +'<button class="sc-btn sc-soft" style="flex:1;justify-content:center" data-action="reopen-game">'+ic('rotate',16)+' Reopen game</button>'
        +'<button class="sc-btn sc-gold" style="flex:1;justify-content:center" data-action="new-game">'+ic('plus',17)+' New game</button></div>';
    }

    var cells='<div></div>';
    g.players.forEach(function(p,i){
      cells+='<div style="text-align:center;padding-bottom:2px"><span class="sc-dot" style="background:'+colors[i]+';display:inline-block;margin-bottom:3px"></span><div style="font-size:11px;color:#cfe3d8;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div></div>';
    });
    for(var r=0;r<displayRounds;r++){
      cells+='<div style="display:flex;align-items:center;justify-content:center;color:#9fc3b3;font-weight:700;font-size:13px">R'+(r+1)+'</div>';
      for(var c=0;c<n;c++){
        var ti=r*n+c, filled=ti<g.scores.length, isCurrent=!g.finished&&ti===g.scores.length;
        if(filled){cells+='<button class="sc-scell" data-action="edit-cell" data-ti="'+ti+'" title="Tap to edit">'+g.scores[ti]+'</button>';}
        else if(isCurrent){cells+='<div class="sc-slot-current" style="height:40px" data-action="focus-entry" title="Current turn"></div>';}
        else{cells+='<div class="sc-slot-empty" style="height:40px"></div>';}
      }
    }
    cells+='<div style="display:flex;align-items:center;justify-content:center;color:#f0c052;font-weight:800;font-size:15px;margin-top:4px">&#931;</div>';
    totals.forEach(function(t){cells+='<div class="sc-total'+(hide?' sc-total-hidden':'')+'" style="margin-top:4px">'+(hide?'•':t)+'</div>';});

    var grid='<div style="margin-bottom:14px">'
      +'<div style="display:flex;align-items:center;gap:6px;color:#8a7c69;font-size:12.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:0 2px 8px">'+ic('hash',14)+' Round by round</div>'
      +'<div class="sc-felt" style="padding:10px;overflow-x:auto"><div style="display:inline-grid;grid-template-columns:46px repeat('+n+',56px);gap:6px;min-width:100%">'+cells+'</div></div>'
      +'<div style="font-size:12px;color:#6f6354;margin:8px 2px 0">Tap any score to fix it. End-of-game tile penalties? Enter a negative number.</div></div>';

    var endBtn=(!g.finished)?'<button class="sc-btn sc-soft" style="width:100%;justify-content:center" data-action="end-game"'+(g.scores.length?'':' disabled')+'>'+ic('flag',16)+' End game &amp; crown the winner</button>':'';

    // spacer so content isn't hidden under the fixed entry panel
    var spacer=(!g.finished)?'<div style="height:230px"></div>':'';

    return '<div class="wrap'+(fade?' fadein':'')+'">'+header+winner+stand+grid+endBtn+spacer+'</div>'+entry;
  }

  function renderModals(){
    var html='';
    if(state.modal){
      var m=state.modal;
      html+='<div class="sc-overlay"><div class="sc-card" style="width:min(420px,92vw);padding:22px">'
        +'<div style="font-size:18px;font-weight:800;margin-bottom:6px">'+esc(m.title)+'</div>'
        +'<div style="color:#b7a892;font-size:14px;line-height:1.5;margin-bottom:18px">'+esc(m.body)+'</div>'
        +'<div style="display:flex;gap:10px;justify-content:flex-end">'
          +'<button class="sc-btn sc-ghost" data-action="modal-cancel">Cancel</button>'
          +'<button class="sc-btn '+(m.danger?'sc-danger':'sc-gold')+'" data-action="modal-yes">'+esc(m.confirm)+'</button>'
        +'</div></div></div>';
    }
    if(state.backup==='export'){
      html+='<div class="sc-overlay"><div class="sc-card" style="width:min(560px,94vw);padding:20px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:18px;font-weight:800">Back up your games</div><button class="sc-icon" data-action="backup-close">'+ic('x',18)+'</button></div>'
        +'<div style="color:#b7a892;font-size:13.5px;line-height:1.5;margin-bottom:12px">Copy this text and keep it safe. Paste it into Restore on any device to bring every game back.</div>'
        +'<textarea id="exportArea" class="sc-area" readonly onfocus="this.select()"></textarea>'
        +'<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="sc-btn sc-gold" data-action="export-copy">'+ic('copy',17)+' Copy</button></div>'
      +'</div></div>';
    } else if(state.backup==='import'){
      html+='<div class="sc-overlay"><div class="sc-card" style="width:min(560px,94vw);padding:20px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="font-size:18px;font-weight:800">Restore games</div><button class="sc-icon" data-action="backup-close">'+ic('x',18)+'</button></div>'
        +'<div style="color:#b7a892;font-size:13.5px;line-height:1.5;margin-bottom:12px">Paste backup text below. Games are merged in — newer versions win, nothing already here is lost.</div>'
        +'<textarea id="importArea" class="sc-area" placeholder="Paste your backup text here…"></textarea>'
        +(state.importErr?'<div style="color:#e6917f;font-size:13px;margin-top:8px">'+esc(state.importErr)+'</div>':'')
        +'<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="sc-btn sc-ghost" data-action="backup-close">Cancel</button><button class="sc-btn sc-gold" data-action="import-do">'+ic('upload',17)+' Restore</button></div>'
      +'</div></div>';
    }
    if(state.editScore!==null){
      var g=currentGame();
      if(g){
        var ti=state.editScore,np=g.players.length,pl=g.players[ti%np],rd=Math.floor(ti/np)+1;
        html+='<div class="sc-overlay"><div class="sc-card" style="width:min(380px,92vw);padding:20px">'
          +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'+avatar(pl.name,COLORS[(ti%np)%COLORS.length],34)
            +'<div><div style="font-size:12.5px;color:#8a7c69;font-weight:600">Round '+rd+' · edit score</div><div style="font-size:17px;font-weight:800">'+esc(pl.name)+'</div></div></div>'
          +editNumpadHTML()
          +'<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="sc-btn sc-ghost" data-action="editscore-cancel">Cancel</button><button class="sc-btn sc-gold" data-action="editscore-save">'+ic('check',17)+' Save</button></div>'
        +'</div></div>';
      }
    }
    return html;
  }

  function render(){
    var screen;
    var page=state.view.name+'|'+state.view.id;
    var fade=page!==prevPage;
    prevPage=page;
    if(state.view.name==='home')screen=viewHome(fade);
    else if(state.view.name==='setup')screen=viewSetup(fade);
    else if(state.view.name==='game')screen=viewGame(fade);
    else screen=viewHome(fade);
    app.innerHTML=screen+renderModals();
    if(state.renaming){var r=document.getElementById('renameInput');if(r){r.focus();r.select();}}
    if(state.backup==='export'){var t=document.getElementById('exportArea');if(t)t.value=state.exportText||'';}
  }

  function showToast(msg,kind){
    var layer=document.getElementById('toastLayer');
    if(!layer){layer=document.createElement('div');layer.id='toastLayer';layer.style.cssText='position:fixed;top:14px;left:0;right:0;z-index:70;';document.body.appendChild(layer);}
    var icon=kind==='ok'?ic('check',16,{stroke:'#f6e7c4'}):ic('crown',16,{fill:'#f6e7c4',stroke:'#f6e7c4',sw:1.5});
    layer.innerHTML='<div class="sc-toast">'+icon+'<span style="margin-left:6px">'+esc(msg)+'</span></div>';
    if(toastTimer)clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){if(layer)layer.innerHTML='';},2600);
  }

  /* ---- handlers ---- */
  function startSetup(){state.setup={name:'',players:[{id:uid(),name:''},{id:uid(),name:''}],hidden:false};state.view={name:'setup',id:null};render();}
  function goHome(){state.view={name:'home',id:null};state.renaming=false;render();}
  function openGame(id){numInput='';state.view={name:'game',id:id};state.renaming=false;render();}

  function captureSetup(){
    var nm=document.getElementById('setupNameInput');if(nm)state.setup.name=nm.value;
    var ins=document.querySelectorAll('[data-setup-name]');
    Array.prototype.forEach.call(ins,function(inp){var i=+inp.getAttribute('data-setup-name');if(state.setup.players[i])state.setup.players[i].name=inp.value;});
  }
  function setupAdd(){captureSetup();if(state.setup.players.length<8)state.setup.players.push({id:uid(),name:''});render();}
  function setupRemove(i){captureSetup();if(state.setup.players.length>2)state.setup.players.splice(i,1);render();}
  function setupMove(i,dir){captureSetup();var p=state.setup.players,j=i+dir;if(j<0||j>=p.length){render();return;}var tmp=p[i];p[i]=p[j];p[j]=tmp;render();}
  function setupToggleHidden(){captureSetup();state.setup.hidden=!state.setup.hidden;render();}
  function setupStart(){
    captureSetup();
    var players=state.setup.players.map(function(p,i){return {id:uid(),name:(p.name||'').trim()||('Player '+(i+1))};});
    var fb='Game · '+new Date().toLocaleDateString(undefined,{day:'numeric',month:'short'});
    var g={id:uid(),name:(state.setup.name||'').trim()||fb,createdAt:Date.now(),updatedAt:Date.now(),players:players,scores:[],finished:false,hidden:!!state.setup.hidden};
    numInput='';state.games.unshift(g);state.view={name:'game',id:g.id};save();render();
  }

  function renameStart(){state.renaming=true;render();}
  function renameCommit(){var el=document.getElementById('renameInput'),g=currentGame();if(el&&g){var v=el.value.trim();if(v){g.name=v;g.updatedAt=Date.now();}}state.renaming=false;save();render();}
  function renameCancel(){state.renaming=false;render();}

  function toggleHidden(){var g=currentGame();if(g&&!g.finished){g.hidden=!g.hidden;g.updatedAt=Date.now();save();render();showToast(g.hidden?'Scores hidden':'Scores shown','ok');}}

  function commitScore(points){
    var g=currentGame();if(!g||g.finished)return;
    var before=leaderInfo(g);
    g.scores.push(points);g.updatedAt=Date.now();
    var justFilled=g.scores.length-1;
    numInput='';
    var playerCount=g.players.length;
    var roundDone=g.scores.length%playerCount===0;
    var roundNum=Math.floor(g.scores.length/playerCount);
    var after=leaderInfo(g);
    save();render();
    // Score cell flash
    var cell=document.querySelector('[data-action="edit-cell"][data-ti="'+justFilled+'"]');
    if(cell){
      cell.classList.add('sc-cell-flash');
      setTimeout(function(){if(cell)cell.classList.remove('sc-cell-flash');},450);
    }
    // Toasts
    if(roundDone){
      var msg=g.hidden?('Round '+roundNum+' done'):('Round '+roundNum+' done · '+(after.unique?g.players[after.index].name+' leads with '+after.max:'Tied at '+after.max));
      showToast(msg,'ok');
    } else if(!g.hidden&&after.unique&&after.max>0&&after.index!==before.index){
      showToast(g.players[after.index].name+' takes the lead','lead');
    }
  }
  function addScore(){
    if(navigator.vibrate)navigator.vibrate(15);
    var v=parseInt(numInput,10);if(isNaN(v))return;commitScore(v);
  }
  function passScore(){
    if(navigator.vibrate)navigator.vibrate(15);
    numInput='';commitScore(0);
  }
  function undoLast(){var g=currentGame();if(g&&g.scores.length){g.scores.pop();g.updatedAt=Date.now();numInput='';save();render();}}

  function openEditScore(ti){
    var g=currentGame();
    if(g&&g.scores[ti]!==undefined){
      var v=g.scores[ti];
      editNumInput=v===0?'':String(v);
    } else {
      editNumInput='';
    }
    state.editScore=ti;render();
  }
  function editScoreSave(){
    var g=currentGame();
    if(g&&state.editScore!==null){
      var v=parseInt(editNumInput,10);
      if(!isNaN(v)){g.scores[state.editScore]=v;g.updatedAt=Date.now();}
    }
    state.editScore=null;save();render();
  }
  function closeEditScore(){state.editScore=null;render();}

  function confirmEnd(){state.modal={title:'End the game?',body:'Totals are locked in and a winner is crowned. You can reopen it later.',confirm:'End game',danger:false,onYes:endGame};render();}
  function endGame(){var g=currentGame();if(g){g.finished=true;g.updatedAt=Date.now();}state.modal=null;save();render();}
  function reopenGame(){var g=currentGame();if(g){g.finished=false;g.updatedAt=Date.now();}save();render();}

  function confirmDelete(id,name){state.modal={title:'Delete this game?',body:'"'+name+'" and its scores will be removed for good.',confirm:'Delete',danger:true,onYes:function(){doDelete(id);}};render();}
  function doDelete(id){state.games=state.games.filter(function(g){return g.id!==id;});if(state.view.id===id)state.view={name:'home',id:null};state.modal=null;save();render();}
  function closeModal(){state.modal=null;render();}

  function openExport(){state.exportText=buildExport(state.games);state.backup='export';render();}
  function openImport(){state.backup='import';state.importErr='';render();}
  function closeBackup(){state.backup=null;state.importErr='';render();}
  function exportCopy(){
    var text=state.exportText||'';
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){showToast('Backup copied','ok');}).catch(function(){var t=document.getElementById('exportArea');if(t){t.focus();t.select();}showToast('Select all and copy','lead');});
    } else {var t=document.getElementById('exportArea');if(t){t.focus();t.select();}showToast('Select all and copy','lead');}
  }
  function importDo(){
    var el=document.getElementById('importArea');if(!el)return;
    var parsed;try{parsed=JSON.parse(el.value);}catch(e){state.importErr='That doesn’t look like valid backup text. Paste the whole thing you copied.';render();return;}
    var incoming=Array.isArray(parsed)?parsed:(parsed&&Array.isArray(parsed.games)?parsed.games:null);
    if(!incoming){state.importErr='Couldn’t find any games in that text.';render();return;}
    var valid=incoming.filter(function(g){return g&&typeof g.id==='string'&&Array.isArray(g.players)&&Array.isArray(g.scores);});
    if(!valid.length){state.importErr='No valid games found in that text.';render();return;}
    state.games=mergeGames(state.games,valid);state.backup=null;state.importErr='';save();render();
    showToast('Restored '+valid.length+' game'+(valid.length>1?'s':''),'ok');
  }

  function closeTop(){if(state.editScore!==null)state.editScore=null;else if(state.backup){state.backup=null;state.importErr='';}else if(state.modal)state.modal=null;render();}

  /* ---- events ---- */
  app.addEventListener('click',function(e){
    if(e.target.classList&&e.target.classList.contains('sc-overlay')){closeTop();return;}
    var el=e.target.closest('[data-action]');if(!el)return;
    var a=el.getAttribute('data-action');
    switch(a){
      case 'new-game':startSetup();break;
      case 'go-home':goHome();break;
      case 'open-game':openGame(el.getAttribute('data-id'));break;
      case 'export-open':openExport();break;
      case 'import-open':openImport();break;
      case 'delete-game':confirmDelete(el.getAttribute('data-id'),el.getAttribute('data-name')||'this game');break;
      case 'setup-add':setupAdd();break;
      case 'setup-remove':setupRemove(+el.getAttribute('data-i'));break;
      case 'setup-move':setupMove(+el.getAttribute('data-i'),+el.getAttribute('data-dir'));break;
      case 'setup-toggle-hidden':setupToggleHidden();break;
      case 'setup-start':setupStart();break;
      case 'setup-back':captureSetup();goHome();break;
      case 'rename-start':renameStart();break;
      case 'rename-commit':renameCommit();break;
      case 'rename-cancel':renameCancel();break;
      case 'toggle-hidden':toggleHidden();break;
      case 'np-digit':npDigit(el.getAttribute('data-d'));break;
      case 'np-del':npDel();break;
      case 'np-sign':npSign();break;
      case 'score-add':addScore();break;
      case 'score-pass':passScore();break;
      case 'score-undo':undoLast();break;
      case 'edit-cell':openEditScore(+el.getAttribute('data-ti'));break;
      case 'focus-entry':break;
      case 'end-game':confirmEnd();break;
      case 'reopen-game':reopenGame();break;
      case 'modal-cancel':closeModal();break;
      case 'modal-yes':if(state.modal&&state.modal.onYes)state.modal.onYes();break;
      case 'backup-close':closeBackup();break;
      case 'export-copy':exportCopy();break;
      case 'import-do':importDo();break;
      case 'editscore-save':editScoreSave();break;
      case 'editscore-cancel':closeEditScore();break;
      case 'edit-np-digit':editNpDigit(el.getAttribute('data-d'));break;
      case 'edit-np-del':editNpDel();break;
      case 'edit-np-sign':editNpSign();break;
    }
  });
  document.addEventListener('keydown',function(e){
    if(state.renaming){
      var r=document.getElementById('renameInput');
      if(e.target===r){if(e.key==='Enter'){e.preventDefault();renameCommit();}else if(e.key==='Escape'){renameCancel();}}
      return;
    }
    if(state.editScore!==null){
      if(e.key>='0'&&e.key<='9'){e.preventDefault();editNpDigit(e.key);}
      else if(e.key==='-'){e.preventDefault();editNpSign();}
      else if(e.key==='Backspace'){e.preventDefault();editNpDel();}
      else if(e.key==='Enter'){e.preventDefault();editScoreSave();}
      else if(e.key==='Escape'){closeEditScore();}
      return;
    }
    if(state.view.name==='game'&&currentGame()&&!currentGame().finished){
      if(e.key>='0'&&e.key<='9'){npDigit(e.key);}
      else if(e.key==='-'){npSign();}
      else if(e.key==='Backspace'){e.preventDefault();npDel();}
      else if(e.key==='Enter'){e.preventDefault();addScore();}
    }
  });

  // Disable all zooming on touch devices (pinch, double-tap, gesture)
  ['gesturestart','gesturechange','gestureend'].forEach(function(ev){
    document.addEventListener(ev,function(e){e.preventDefault();},{passive:false});
  });
  document.addEventListener('touchmove',function(e){
    if(e.touches.length>1){e.preventDefault();}
  },{passive:false});
  var lastTouchEnd=0;
  document.addEventListener('touchend',function(e){
    var now=e.timeStamp||0;
    if(now-lastTouchEnd<=300){e.preventDefault();}
    lastTouchEnd=now;
  },{passive:false});

  load();render();
})();
</script>
</body>
</html>
